
<style>

<g class="c-blue"><rect x="460" y="56" width="180" height="100" rx="10" stroke-width="0.5"/>
<text class="th" x="550" y="82" text-anchor="middle" dominant-baseline="central">VM 3</text>
<text class="ts" x="550" y="102" text-anchor="middle" dominant-baseline="central">thinks RAM:</text>
<text class="ts" x="550" y="120" text-anchor="middle" dominant-baseline="central">0 → 4GB</text>
<text class="ts" x="550" y="138" text-anchor="middle" dominant-baseline="central">all mine! 😤</text></g>
<g class="c-gray"><rect x="40" y="192" width="600" height="60" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="215" text-anchor="middle" dominant-baseline="central">Actual Physical RAM</text>

<div class="panel" id="p1">
<svg width="100%" viewBox="0 0 680 360">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="340" y="28" text-anchor="middle" dominant-baseline="central">Option 1 — Double Translation ❌ Too Expensive!</text>
<g class="c-coral"><rect x="40" y="60" width="120" height="52" rx="8" stroke-width="0.5"/><text class="th" x="100" y="80" text-anchor="middle" dominant-baseline="central">App</text><text class="ts" x="100" y="98" text-anchor="middle" dominant-baseline="central">uses VA</text></g>
<path d="M160 86 L198 86" fill="none" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="179" y="76" text-anchor="middle">Step 1</text>
<g class="c-purple"><rect x="198" y="60" width="140" height="52" rx="8" stroke-width="0.5"/><text class="th" x="268" y="80" text-anchor="middle" dominant-baseline="central">Guest PT</text><text class="ts" x="268" y="98" text-anchor="middle" dominant-baseline="central">VA → PA</text></g>
<path d="M338 86 L376 86" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="357" y="76" text-anchor="middle">Step 2</text>
<g class="c-blue"><rect x="376" y="60" width="140" height="52" rx="8" stroke-width="0.5"/><text class="th" x="446" y="80" text-anchor="middle" dominant-baseline="central">Hypervisor PT</text><text class="ts" x="446" y="98" text-anchor="middle" dominant-baseline="central">PA → MA</text></g>
<path d="M516 86 L554 86" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="535" y="76" text-anchor="middle">Step 3</text>
<g class="c-gray"><rect x="554" y="60" width="86" height="52" rx="8" stroke-width="0.5"/><text class="th" x="597" y="80" text-anchor="middle" dominant-baseline="central">RAM</text><text class="ts" x="597" y="98" text-anchor="middle" dominant-baseline="central">MA</text></g>
<g class="c-red"><rect x="140" y="148" width="400" height="56" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="168" text-anchor="middle" dominant-baseline="central">Problem: 2 translations on EVERY memory access!</text>
<text class="ts" x="340" y="188" text-anchor="middle" dominant-baseline="central">VA→PA (Guest PT) then PA→MA (Hypervisor PT) — doubles the cost 💸</text></g>
<text class="ts" x="340" y="240" text-anchor="middle">Imagine accessing memory millions of times per second...</text>
<text class="ts" x="340" y="260" text-anchor="middle">doing 2 table lookups every single time = too slow! ❌</text>
<text class="ts" x="340" y="300" text-anchor="middle">So engineers came up with a smarter solution — Shadow Page Tables 👇</text>
</svg>
</div>

<div class="panel" id="p2">
<svg width="100%" viewBox="0 0 680 380">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="340" y="28" text-anchor="middle" dominant-baseline="central">Option 2 — Shadow Page Tables ✅</text>
<g class="c-purple"><rect x="40" y="60" width="150" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="84" text-anchor="middle" dominant-baseline="central">Guest PT</text>
<text class="ts" x="115" y="104" text-anchor="middle" dominant-baseline="central">VA → PA</text>
<text class="ts" x="115" y="120" text-anchor="middle" dominant-baseline="central">(OS manages)</text></g>
<g class="c-teal"><rect x="265" y="60" width="150" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="84" text-anchor="middle" dominant-baseline="central">Shadow PT</text>
<text class="ts" x="340" y="104" text-anchor="middle" dominant-baseline="central">VA → MA</text>
<text class="ts" x="340" y="120" text-anchor="middle" dominant-baseline="central">(Hypervisor keeps)</text></g>
<g class="c-gray"><rect x="490" y="60" width="150" height="70" rx="8" stroke-width="0.5"/>
<text class="th" x="565" y="84" text-anchor="middle" dominant-baseline="central">TLB cache</text>
<text class="ts" x="565" y="104" text-anchor="middle" dominant-baseline="central">VA → MA</text>
<text class="ts" x="565" y="120" text-anchor="middle" dominant-baseline="central">(hardware cache)</text></g>
<path d="M415 95 L488 95" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="452" y="83" text-anchor="middle">copied into</text>
<text class="ts" x="115" y="150" text-anchor="middle" style="fill:var(--color-text-tertiary)">OS thinks its normal</text>
<text class="ts" x="340" y="150" text-anchor="middle" style="fill:var(--color-text-tertiary)">secret hypervisor table</text>
<text class="ts" x="565" y="150" text-anchor="middle" style="fill:var(--color-text-tertiary)">super fast lookup</text>
<g class="c-amber"><rect x="40" y="172" width="600" height="56" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="192" text-anchor="middle" dominant-baseline="central">Result: Only 1 translation needed! VA → MA directly 🎉</text>
<text class="ts" x="340" y="212" text-anchor="middle" dominant-baseline="central">TLB caches this — so most accesses are instant!</text></g>
<text class="ts" x="340" y="258" text-anchor="middle">Hypervisor maintains consistency — 2 rules:</text>
<g class="c-blue"><rect x="60" y="274" width="256" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="188" y="294" text-anchor="middle" dominant-baseline="central">Invalidate on context switch</text>
<text class="ts" x="188" y="312" text-anchor="middle" dominant-baseline="central">clear TLB when VM switches</text></g>
<g class="c-blue"><rect x="364" y="274" width="256" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="492" y="294" text-anchor="middle" dominant-baseline="central">Write-protect guest PT</text>
<text class="ts" x="492" y="312" text-anchor="middle" dominant-baseline="central">track when OS changes mappings</text></g>
</svg>
</div>

<div class="panel" id="p3">
<svg width="100%" viewBox="0 0 680 360">
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="540" y="158" text-anchor="middle" dominant-baseline="central">Update PT</text>
<text class="ts" x="540" y="176" text-anchor="middle" dominant-baseline="central">hypercall</text></g>
<g class="c-teal"><rect x="160" y="224" width="360" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="244" text-anchor="middle" dominant-baseline="central">Hypervisor</text>
<text class="ts" x="340" y="262" text-anchor="middle" dominant-baseline="central">handles directly — no tricks needed</text></g>
<g class="c-amber"><rect x="60" y="300" width="256" height="44" rx="8" stroke-width="0.5"/>

<text class="th" x="492" y="318" text-anchor="middle" dominant-baseline="central">No contiguous RAM needed</text>

<div style="display:flex;justify-content:center;gap:12px;margin-top:14px;align-items:center">
<button class="btn" id="prev" onclick="go(-1)" disabled>← Prev</button>
<span id="counter" style="font-size:13px;color:var(--color-text-secondary)">1 / 4</span>
<button class="btn" id="next" onclick="go(1)">Next →</button>
</div>
</div>
<script>
var cur=0,total=4;
var panels=document.querySelectorAll('.panel');
var dotDiv=document.getElementById('dots');
for(var i=0;i<total;i++){var d=document.createElement('span');d.className='dot'+(i===0?' active':'');d.setAttribute('data-i',i);d.onclick=function(){go(parseInt(this.getAttribute('data-i'))-cur);};dotDiv.appendChild(d);}
function go(dir){panels[cur].classList.remove('active');dotDiv.children[cur].classList.remove('active');cur=Math.max(0,Math.min(total-1,cur+dir));panels[cur].classList.add('active');dotDiv.children[cur].classList.add('active');document.getElementById('prev').disabled=cur===0;document.getElementById('next').disabled=cur===total-1;document.getElementById('counter').textContent=(cur+1)+' / '+total;}
</script>
